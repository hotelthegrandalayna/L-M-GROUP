[build]
  command = "npm run build"
  publish = "dist"

# Never cache the version file — the auto-updater must always see the latest deploy.
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache the app shell, so a reload always fetches the newest JS bundle.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
